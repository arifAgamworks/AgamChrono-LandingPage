<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onboarding Successful</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #8D75F5;
            --secondary-color: #6B5BCC;
            --success-color: #16a34a;
        }

        * {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #8D75F5 0%, #6B5BCC 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .success-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            padding: 60px 40px;
            text-align: center;
            max-width: 500px;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .success-icon {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, var(--success-color) 0%, #059669 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            animation: scaleIn 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        @keyframes scaleIn {
            from {
                transform: scale(0);
            }
            to {
                transform: scale(1);
            }
        }

        .success-icon i {
            font-size: 50px;
            color: white;
        }

        .success-heading {
            font-size: 32px;
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 15px;
        }

        .success-message {
            font-size: 18px;
            color: #6b7280;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .success-details {
            background: #f3f4f6;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            text-align: left;
        }

        .detail-item {
            display: flex;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #e5e7eb;
        }

        .detail-item:last-child {
            border-bottom: none;
        }

        .detail-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            flex-shrink: 0;
        }

        .detail-icon i {
            font-size: 18px;
            color: white;
        }

        .detail-text {
            flex: 1;
        }

        .detail-label {
            font-size: 12px;
            color: #9ca3af;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .detail-value {
            font-size: 14px;
            color: #1f2937;
            font-weight: 600;
            margin-top: 2px;
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .btn-primary-custom {
            flex: 1;
            min-width: 200px;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            border: none;
            color: white;
            padding: 14px 20px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary-custom:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(141, 117, 245, 0.3);
            color: white;
            text-decoration: none;
        }

        .btn-secondary-custom {
            flex: 1;
            background: #e5e7eb;
            border: none;
            color: #374151;
            padding: 14px 20px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-secondary-custom:hover {
            background: #d1d5db;
            color: #1f2937;
            text-decoration: none;
        }

        .countdown-timer {
            font-size: 12px;
            color: #9ca3af;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e5e7eb;
        }

        .countdown-number {
            font-weight: 700;
            color: var(--primary-color);
            font-size: 16px;
        }

        @media (max-width: 480px) {
            .success-container {
                padding: 40px 25px;
            }

            .success-heading {
                font-size: 24px;
            }

            .success-message {
                font-size: 16px;
            }

            .action-buttons {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="success-container">
        <!-- Success Icon -->
        <div class="success-icon">
            <i class="fas fa-check"></i>
        </div>

        <!-- Success Message -->
        <h1 class="success-heading">Organization Onboarded Successfully!</h1>
        <p class="success-message">Your organization has been successfully onboarded to Agam Chrono. You can now access the platform with your credentials.</p>

        <!-- Success Details -->
        <div class="success-details">
            <div class="detail-item">
                <div class="detail-icon">
                    <i class="fas fa-building"></i>
                </div>
                <div class="detail-text">
                    <div class="detail-label">Status</div>
                    <div class="detail-value">Active</div>
                </div>
            </div>

            <div class="detail-item">
                <div class="detail-icon">
                    <i class="fas fa-calendar-check"></i>
                </div>
                <div class="detail-text">
                    <div class="detail-label">Onboarding Date</div>
                    <div class="detail-value" id="onboardDate">Today</div>
                </div>
            </div>

            <div class="detail-item">
                <div class="detail-icon">
                    <i class="fas fa-shield-alt"></i>
                </div>
                <div class="detail-text">
                    <div class="detail-label">Account Type</div>
                    <div class="detail-value">Administrator</div>
                </div>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="action-buttons">
            <button class="btn-primary-custom" id="onboardAgainBtn">
                <i class="fas fa-plus-circle"></i> Onboard Another Organization
            </button>
        </div>

        <!-- Countdown Timer -->
        <div class="countdown-timer" id="countdownContainer" style="display: none;">
            Redirecting in <span class="countdown-number" id="countdownTimer">10</span> seconds...
        </div>
    </div>

    <script>
        // Set today's date
        const today = new Date();
        const dateOptions = { year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('onboardDate').textContent = today.toLocaleDateString('en-US', dateOptions);

        // Onboard Another Organization button click handler
        document.getElementById('onboardAgainBtn').addEventListener('click', function () {
            window.location.href = 'org-onboard.html';
        });
    </script>
</body>
</html>
